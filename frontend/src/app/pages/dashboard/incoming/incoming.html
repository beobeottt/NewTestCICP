<div class="space-y-4">

  <div class="flex items-center justify-between gap-4">
    <div class="space-y-1">
      <h2 class="text-xl font-semibold dark:text-cyan-700">
        Công Văn
      </h2>
      <div class="flex items-center gap-2 text-sm text-gray-600">
        <label>Trạng thái:</label>
        <select
          class="border rounded-lg px-2 py-1"
          [(ngModel)]="statusFilter"
        >
          <option value="All">Tất cả</option>
          <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
        </select>

        <input
          type="text"
          [(ngModel)]="searchTerm"
          placeholder="Tìm theo tiêu đề/mô tả..."
          class="border rounded-lg px-2 py-1 w-56"
        />
      </div>
    </div>

    <button
      (click)="openModal()"
      class="bg-cyan-600 text-white px-4 py-2 rounded-lg hover:bg-cyan-700 transition"
    >
      Thêm công văn
    </button>
  </div>

  <p *ngIf="errorMessage" class="text-red-600 text-sm">
    {{ errorMessage }}
  </p>

  <div class="bg-white rounded-xl shadow overflow-auto max-h-[calc(100vh-220px)]">

    <table class="w-full text-left min-w-full">

      <thead class="bg-gray-50">
        <tr>
          <th class="p-3 text-sm font-semibold text-gray-600">
            Tiêu đề
          </th>

          <th class="p-3 text-sm font-semibold text-gray-600">
            Mô tả
          </th>

          <th class="p-3 text-sm font-semibold text-gray-600">
            Trạng thái
          </th>

          <th class="p-3 text-sm font-semibold text-gray-600">
            Cập nhật
          </th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let d of filteredDocuments" class="border-t">

          <td class="p-3 font-medium text-gray-800">
            <a
              class="text-cyan-700 hover:underline"
              [routerLink]="['/dashboard/document', d.id]"
            >
              {{ d.title }}
            </a>
          </td>

          <td class="p-3 text-gray-600 line-clamp-1">
            {{ d.description }}
          </td>

          <td class="p-3">
            <span
              class="px-2 py-1 rounded-full text-xs font-semibold"
              [ngClass]="{
                'bg-amber-100 text-amber-700': roleLabel(d.role) === 'Pending',
                'bg-green-100 text-green-700': roleLabel(d.role) === 'Approved',
                'bg-red-100 text-red-700': roleLabel(d.role) === 'Rejected'
              }"
            >
              {{ roleLabel(d.role) }}
            </span>
          </td>

          <td class="p-3 text-gray-500 text-sm">
            {{ d.updateAt | date: 'short' }}
          </td>

        </tr>

        <tr *ngIf="documents.length === 0">
          <td colspan="4" class="p-4 text-gray-500 text-center">
            Chưa có dữ liệu.
          </td>
        </tr>

      </tbody>

    </table>

  </div>
</div>

<div
  *ngIf="showModal"
  class="fixed inset-0 bg-black/40 flex items-center justify-center z-50"
>

  <div class="bg-white w-[600px] rounded-xl shadow-lg p-6 relative">

    <button
      (click)="closeModal()"
      class="absolute top-3 right-3 text-gray-500 hover:text-black"
    >
      ✕
    </button>

    <h2 class="text-xl font-semibold text-cyan-700 mb-4">
      Thêm công văn
    </h2>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
      class="space-y-4"
    >

      <div>
        <label class="block text-sm font-medium mb-1">
          Tiêu đề
        </label>

        <input
          type="text"
          formControlName="title"
          class="w-full px-3 py-2 border rounded-lg"
        />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">
          Mô tả
        </label>

        <input
          type="text"
          formControlName="description"
          class="w-full px-3 py-2 border rounded-lg"
        />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">
          Nội dung
        </label>

        <textarea
          rows="5"
          formControlName="content"
          class="w-full px-3 py-2 border rounded-lg"
        ></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">
          Trạng thái
        </label>

        <select
          formControlName="role"
          class="w-full border rounded-lg px-3 py-2"
        >
          <option *ngFor="let r of roles" [value]="r">
            {{ r }}
          </option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">
          Người tạo
        </label>

        <input
          type="text"
          formControlName="createBy"
          class="w-full px-3 py-2 border rounded-lg"
        />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">
          File đính kèm
        </label>

        <input
          type="file"
          (change)="onFileChange($event)"
          class="w-full px-3 py-2 border rounded-lg"
        />
      </div>

      <div class="flex justify-end gap-2">

        <button
          type="button"
          (click)="closeModal()"
          class="px-4 py-2 border rounded-lg"
        >
          Hủy
        </button>

        <button
          type="submit"
          class="bg-cyan-600 text-white px-4 py-2 rounded-lg"
        >
          Tạo
        </button>

      </div>

    </form>

  </div>
</div>
