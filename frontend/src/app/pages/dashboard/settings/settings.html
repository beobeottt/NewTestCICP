<div class="space-y-6 max-w-xl">

  <h2 class="text-xl font-semibold text-cyan-700 dark:text-cyan-400">
    Cài Đặt
  </h2>

  <div class="bg-white dark:bg-gray-800 rounded-xl shadow p-4 space-y-4">

    <!-- Ngôn ngữ -->
    <div>
      <label class="block text-sm font-medium mb-1 dark:text-gray-300">
        Ngôn ngữ
      </label>

      <select class="w-full border rounded-lg px-3 py-2 dark:bg-gray-700 dark:text-white dark:border-gray-600">
        <option>Tiếng Việt</option>
        <option>English</option>
      </select>
    </div>

    <!-- Dark mode switch -->
    <div>
      <label class="block text-sm font-medium mb-2 dark:text-gray-300">
        Chế độ giao diện
      </label>

      <label class="flex items-center cursor-pointer">
        
        <div class="relative">

          <!-- input -->
          <input
            type="checkbox"
            class="sr-only"
            (change)="toggleDarkMode($event)"
            [checked]="isDark"
          />

          <!-- background -->
          <div
            class="w-12 h-6 bg-gray-300 dark:bg-gray-600 rounded-full transition"
          ></div>

          <!-- circle -->
          <div
            class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition-all duration-300"
            [ngClass]="{
              'translate-x-6 bg-cyan-500': isDark
            }"
          ></div>

        </div>

        <span class="ml-3 text-sm dark:text-gray-300">
          {{ isDark ? '🌙 Dark' : '☀️ Light' }}
        </span>

      </label>
    </div>

  </div>

  <p class="text-sm text-gray-400 dark:text-gray-500">
  </p>

</div>
