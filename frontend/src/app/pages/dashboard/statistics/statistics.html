<div class="space-y-6">
  <h2 class="text-xl font-semibold text-cyan-700">Thống Kê</h2>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="bg-white rounded-xl shadow p-4">
      <p class="text-gray-500 text-sm">Tổng số công văn</p>
      <p class="text-2xl font-bold text-cyan-600">{{ total }}</p>
    </div>
    <div class="bg-white rounded-xl shadow p-4">
      <p class="text-gray-500 text-sm">Đã xử lý</p>
      <p class="text-2xl font-bold text-green-600">{{ approved }}</p>
    </div>
    <div class="bg-white rounded-xl shadow p-4">
      <p class="text-gray-500 text-sm">Chờ xử lý</p>
      <p class="text-2xl font-bold text-amber-500">{{ pending }}</p>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow p-4 max-w-md">
    <p class="text-gray-500 text-sm mb-2">Bị từ chối</p>
    <p class="text-2xl font-bold text-red-500">{{ rejected }}</p>
  </div>

  <p class="text-sm text-gray-400">
  </p>
</div>
