<div class="max-w-3xl space-y-4">
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-semibold text-cyan-700">Thêm công văn</h2>
    <a routerLink="/documents" class="text-cyan-700 hover:underline">Quay lại</a>
  </div>

  <p *ngIf="errorMessage" class="text-red-600 text-sm">{{ errorMessage }}</p>

  <form (ngSubmit)="submit()" [formGroup]="form" class="bg-white rounded-xl shadow p-4 space-y-4">
    <div>
      <label class="block text-sm font-medium mb-1">Tiêu đề</label>
      <input
        type="text"
        formControlName="title"
        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-cyan-400"
      />
      <p *ngIf="form.get('title')?.invalid && form.get('title')?.touched" class="text-red-500 text-sm mt-1">
        Tiêu đề là bắt buộc
      </p>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Mô tả</label>
      <input
        type="text"
        formControlName="description"
        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-cyan-400"
      />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Nội dung</label>
      <textarea
        rows="6"
        formControlName="content"
        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-cyan-400"
      ></textarea>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium mb-1">Trạng thái</label>
        <select formControlName="role" class="w-full border rounded-lg px-3 py-2">
          <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Người tạo</label>
        <input
          type="text"
          formControlName="createBy"
          class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-cyan-400"
        />
      </div>
    </div>

    <div class="flex items-center justify-end gap-2">
      <button
        type="submit"
        [disabled]="isSubmitting"
        class="bg-cyan-600 text-white px-4 py-2 rounded-lg hover:bg-cyan-700 transition"
      >
        {{ isSubmitting ? 'Đang lưu...' : 'Tạo' }}
      </button>
    </div>
  </form>
</div>
