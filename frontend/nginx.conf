server {
    listen 80;
    server_name localhost;

    # 1. Phục vụ ứng dụng Angular (Frontend)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Chuyển tiếp các request API sang Backend container
    location /api/ {
        proxy_pass http://backend_api:5000/api/; # 'backend_api' là tên service trong docker-compose
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 3. CHÍNH LÀ ĐÂY: Fix lỗi load file PDF
    location /uploads/ {
        proxy_pass http://backend_api:5000/uploads/;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *; # Cho phép mọi nguồn đọc file
    }
}